services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8000"
      REDIS_URL: "redis://redis:6379/0"
      AGENT_API_KEY: "${AGENT_API_KEY:-secret}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-10}"
      MONTHLY_BUDGET_USD: "${MONTHLY_BUDGET_USD:-10}"
      COST_PER_REQUEST_USD: "${COST_PER_REQUEST_USD:-0.01}"
      SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-604800}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      BASE_URL: "${BASE_URL:-}"
      JINA_API_KEY: "${JINA_API_KEY:-}"
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent

volumes:
  redis-data:
